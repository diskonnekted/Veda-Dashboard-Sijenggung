<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Peta Desa Sijenggung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Draw -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .leaflet-container { font-family: 'Inter', sans-serif; }
        .veda-vertex-icon {
            position: relative;
            background: #ffffff;
            border: 2px solid #2563eb;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,.35);
        }
        .veda-vertex-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: #2563eb;
            border-radius: 9999px;
            transform: translate(-50%, -50%);
        }
        .veda-vertex-touch-icon {
            position: relative;
            background: rgba(37,99,235,.15);
            border: 2px solid #2563eb;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,.25);
        }
        .veda-vertex-touch-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: #2563eb;
            border-radius: 9999px;
            transform: translate(-50%, -50%);
        }
        .veda-vertex-first.veda-vertex-icon,
        .veda-vertex-first.veda-vertex-touch-icon {
            border-color: #16a34a !important;
        }
        .veda-vertex-first.veda-vertex-icon::after,
        .veda-vertex-first.veda-vertex-touch-icon::after {
            background: #16a34a !important;
        }
        .veda-vertex-first.veda-vertex-touch-icon {
            background: rgba(22,163,74,.18);
        }
        .leaflet-draw-marker-first {
            border-color: #16a34a !important;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-slate-800 text-white shadow-md z-30 h-14 flex items-center justify-between px-4">
        <div class="flex items-center space-x-3">
            <img src="/logo.png" alt="Logo" class="h-8 w-auto">
            <div>
                <h1 class="font-bold text-lg leading-tight">Editor Peta Sijenggung</h1>
                <p class="text-[10px] text-slate-300">Admin Panel</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="saveCurrentLayer()" class="bg-green-600 hover:bg-green-700 px-3 py-1.5 rounded text-sm font-medium flex items-center gap-2">
                <i class="fas fa-save"></i> Simpan Perubahan
            </button>
            <a href="/analitik" target="_blank" class="bg-teal-500 hover:bg-teal-600 text-white px-3 py-2 rounded text-sm font-bold shadow-sm transition flex items-center">
                <i class="fa fa-chart-line mr-2"></i> Analitik
            </a>
            <a href="/" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded text-sm font-bold shadow-sm transition flex items-center">
                <i class="fa fa-map mr-2"></i> Peta Sebaran
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Sidebar Controls -->
        <div class="w-80 bg-white shadow-xl z-20 flex flex-col border-r border-gray-200">
            <div class="p-4 border-b border-gray-100">
                <h2 class="font-bold text-gray-700 mb-3">Layer Manager</h2>
                
                <!-- Layer Selection -->
                <div class="space-y-2">
                    <label class="block text-xs font-semibold text-gray-500 uppercase">Pilih Layer untuk Diedit</label>
                    <select id="layer-select" class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="" disabled selected>-- Pilih Layer --</option>
                        <optgroup label="Data Penduduk">
                            <option value="households">Lokasi Rumah Tangga</option>
                        </optgroup>
                        <optgroup label="Layer Peta (GeoJSON)" id="geojson-layers-opt">
                            <!-- Populated via JS -->
                        </optgroup>
                    </select>
                </div>

                <!-- Filter/Search -->
                <div id="filter-container" class="space-y-2 mt-3 hidden">
                    <label class="block text-xs font-semibold text-gray-500 uppercase">Cari / Filter</label>
                    <div class="flex gap-1">
                        <input type="text" id="search-input" placeholder="Cari Nama / KK..." class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm">
                        <button onclick="filterHouseholds()" class="bg-blue-600 text-white px-3 rounded text-sm hover:bg-blue-700">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <div class="text-[10px] text-gray-400 italic">Tekan enter atau klik ikon cari</div>
                </div>

                <div class="mt-4 flex gap-2">
                    <button onclick="createNewLayer()" class="flex-1 bg-blue-50 text-blue-600 border border-blue-200 py-1.5 rounded text-xs hover:bg-blue-100">
                        <i class="fas fa-plus"></i> Buat Layer Baru
                    </button>
                    <button onclick="refreshLayers()" class="bg-gray-50 text-gray-600 border border-gray-200 px-3 py-1.5 rounded text-xs hover:bg-gray-100">
                        <i class="fas fa-sync"></i>
                    </button>
                </div>
            </div>

            <!-- Feature Editor Form -->
            <div class="flex-1 overflow-y-auto p-4 hidden" id="feature-editor">
                <h3 class="font-bold text-gray-700 mb-2 border-b pb-1">Edit Properti</h3>
                <div id="form-container" class="space-y-3">
                    <!-- Dynamic inputs generated here -->
                </div>
                <div class="mt-4 pt-3 border-t flex justify-between gap-2">
                    <button onclick="deleteSelectedFeature()" class="bg-red-500 text-white px-3 py-1.5 rounded text-sm hover:bg-red-600">
                        <i class="fas fa-trash"></i> Hapus
                    </button>
                    <button onclick="applyProperties()" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm hover:bg-blue-700">Update</button>
                </div>
            </div>

            <div id="editor-instructions" class="p-6 text-center text-gray-400 text-sm mt-10">
                <i class="fas fa-map-marked-alt text-4xl mb-3 text-gray-300"></i>
                <p>Pilih layer di atas untuk mulai mengedit geometri atau data.</p>
            </div>
        </div>

        <!-- Map Area -->
        <div class="flex-1 relative bg-gray-100">
            <div id="finish-draw-container" class="absolute bottom-6 right-6 z-[1000] hidden">
                <button id="finish-draw-btn" type="button" onclick="finishDrawing()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-3 rounded-full shadow-lg flex items-center gap-2">
                    <i class="fa fa-check"></i> Selesai Area
                </button>
                <div class="mt-2 text-xs text-white/90 bg-black/50 px-3 py-2 rounded-lg backdrop-blur-sm">
                    Tekan Enter untuk selesai, Esc untuk batal
                </div>
            </div>
            <div id="map" class="h-full w-full"></div>
        </div>
    </div>

    <script>
        // --- Map Initialization ---
        const map = L.map('map').setView([-7.295, 109.665], 15);
        L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: 'Google Satellite'
        }).addTo(map);

        // --- Reference Layers (Batas Desa & Dusun) ---
        const referenceLayers = L.layerGroup().addTo(map);

        // Load Batas Desa (Boundary)
        fetch('/boundary.geojson?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: '#fbbf24', // Amber
                        weight: 2,
                        opacity: 0.8,
                        fillColor: 'transparent', // No fill to see editing layer
                        fillOpacity: 0,
                        dashArray: '5, 5'
                    },
                    interactive: false // Make it non-clickable so it doesn't interfere with editing
                }).addTo(referenceLayers);
            })
            .catch(e => console.error("Gagal memuat batas desa", e));

        // Load Batas Dusun
        fetch('/layers/dusun.geojson?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: '#fff', 
                        weight: 1,
                        opacity: 0.6,
                        fillColor: '#fff', 
                        fillOpacity: 0.05, // Very slight tint
                        dashArray: '3, 3'
                    },
                    interactive: false
                }).addTo(referenceLayers);
            })
            .catch(e => console.error("Gagal memuat batas dusun", e));

        // Feature Group for Editable Layers
        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        const vertexIcon = new L.DivIcon({
            className: 'leaflet-div-icon leaflet-editing-icon veda-vertex-icon',
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        const vertexTouchIcon = new L.DivIcon({
            className: 'leaflet-div-icon leaflet-editing-icon leaflet-touch-icon veda-vertex-touch-icon',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });

        // Draw Control
        const drawControl = new L.Control.Draw({
            edit: {
                featureGroup: drawnItems
            },
            draw: {
                polygon: {
                    allowIntersection: false,
                    showArea: true,
                    icon: vertexIcon,
                    touchIcon: vertexTouchIcon
                },
                polyline: {
                    icon: vertexIcon,
                    touchIcon: vertexTouchIcon
                },
                rectangle: true,
                circle: false,
                circlemarker: false,
                marker: true
            }
        });
        map.addControl(drawControl);

        const finishDrawContainer = document.getElementById('finish-draw-container');
        let activeDrawLayerType = null;

        function setFinishButtonVisible(visible) {
            if (visible) finishDrawContainer.classList.remove('hidden');
            else finishDrawContainer.classList.add('hidden');
        }

        function getActiveDrawHandler() {
            return drawControl && drawControl._toolbars && drawControl._toolbars.draw && drawControl._toolbars.draw._activeMode
                ? drawControl._toolbars.draw._activeMode.handler
                : null;
        }

        window.finishDrawing = function() {
            const handler = getActiveDrawHandler();
            if (!handler) return;
            if (activeDrawLayerType !== 'polygon' && activeDrawLayerType !== 'polyline') return;

            if (typeof handler.completeShape === 'function') handler.completeShape();
            else if (typeof handler._finishShape === 'function') handler._finishShape();
            else if (typeof handler._finishDrawing === 'function') handler._finishDrawing();

            if (typeof handler.disable === 'function') handler.disable();
            setFinishButtonVisible(false);
        };

        map.on('draw:drawstart', function(e) {
            activeDrawLayerType = e.layerType || null;
            setFinishButtonVisible(activeDrawLayerType === 'polygon' || activeDrawLayerType === 'polyline');
        });

        map.on('draw:drawstop', function() {
            activeDrawLayerType = null;
            setFinishButtonVisible(false);
        });

        map.on('draw:created', function() {
            activeDrawLayerType = null;
            setFinishButtonVisible(false);
        });

        map.on('draw:drawvertex', function() {
            document.querySelectorAll('.veda-vertex-first').forEach(el => el.classList.remove('veda-vertex-first'));
            const first = document.querySelector('.leaflet-draw-marker-first');
            if (first) first.classList.add('veda-vertex-first');
        });

        document.addEventListener('keydown', function(e) {
            if (activeDrawLayerType !== 'polygon' && activeDrawLayerType !== 'polyline') return;
            if (e.key === 'Enter') {
                e.preventDefault();
                window.finishDrawing();
            }
            if (e.key === 'Escape') {
                const handler = getActiveDrawHandler();
                if (handler && typeof handler.disable === 'function') handler.disable();
                activeDrawLayerType = null;
                setFinishButtonVisible(false);
            }
        });

        // State
        let currentLayerName = null;
        let currentGeoJSON = null;
        let selectedLayer = null; // The specific feature selected
        let allHouseholdsData = []; // Cache for filtering

        // --- Event Listeners ---
        
        // 1. Draw Created
        map.on(L.Draw.Event.CREATED, function (e) {
            const layer = e.layer;
            
            // Add default props
            layer.feature = layer.feature || {};
            layer.feature.type = "Feature";
            layer.feature.properties = layer.feature.properties || {};
            // Default style
            if (!layer.feature.properties._style) {
                layer.feature.properties._style = {
                    color: '#2563eb',
                    weight: 3,
                    opacity: 1,
                    fillColor: '#10b981',
                    fillOpacity: 0.2,
                    radius: 6
                };
            }
            // Apply default style visually
            if (layer.setStyle) {
                layer.setStyle({
                    color: layer.feature.properties._style.color,
                    weight: layer.feature.properties._style.weight,
                    opacity: layer.feature.properties._style.opacity,
                    fillColor: layer.feature.properties._style.fillColor,
                    fillOpacity: layer.feature.properties._style.fillOpacity
                });
            } else if (layer.setRadius) {
                layer.setStyle({
                    color: layer.feature.properties._style.color,
                    weight: layer.feature.properties._style.weight,
                    opacity: layer.feature.properties._style.opacity,
                    fillColor: layer.feature.properties._style.fillColor,
                    fillOpacity: layer.feature.properties._style.fillOpacity
                });
                layer.setRadius(layer.feature.properties._style.radius);
            }
            
            // If editing households, ensure required props
            if (currentLayerName === 'households') {
                layer.feature.properties = {
                    head_name: "Nama Baru",
                    no_kk: "",
                    dusun: ""
                };
            }

            drawnItems.addLayer(layer);
            selectFeature(layer);
        });

        // 2. Click to Select/Edit
        drawnItems.on('click', function(e) {
            selectFeature(e.layer);
        });

        // --- Functions ---

        function selectFeature(layer) {
            selectedLayer = layer;
            const props = layer.feature ? layer.feature.properties : {};
            const styleProps = (props && props._style) ? props._style : {};
            
            const container = document.getElementById('form-container');
            container.innerHTML = '';
            
            // Show Editor Panel
            document.getElementById('feature-editor').classList.remove('hidden');
            document.getElementById('editor-instructions').classList.add('hidden');

            // Generate Inputs based on keys
            // For households, specific fields. For GeoJSON, generic.
            
            if (currentLayerName === 'households') {
                createInput(container, 'No KK', 'no_kk', props.no_kk);
                createInput(container, 'Nama Kepala', 'head_name', props.head_name);
                createInput(container, 'Alamat', 'address', props.address);
                createInput(container, 'Dusun', 'dusun', props.dusun);
            } else {
                // Generic GeoJSON
                const keys = Object.keys(props).length ? Object.keys(props) : ['name', 'keterangan'];
                keys.forEach(k => {
                    createInput(container, k, k, props[k]);
                });
                // Add button to add new property
                const addBtn = document.createElement('button');
                addBtn.className = "text-xs text-blue-600 mt-2 hover:underline";
                addBtn.innerText = "+ Tambah Properti";
                addBtn.onclick = () => {
                    const key = prompt("Nama Properti Baru:");
                    if (key) createInput(container, key, key, "");
                };
                container.appendChild(addBtn);
            }

            // --- Style Controls (Color & Size) ---
            const styleDiv = document.createElement('div');
            styleDiv.className = "mt-4 pt-3 border-t";
            styleDiv.innerHTML = `
                <h4 class="font-bold text-gray-700 mb-2">Style</h4>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Warna Garis</label>
                        <input type="color" id="style-color" value="${styleProps.color || layer.options.color || '#2563eb'}" class="w-full h-8 border rounded">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Tebal Garis</label>
                        <input type="number" id="style-weight" min="1" max="12" value="${styleProps.weight ?? layer.options.weight ?? 3}" class="w-full border rounded px-2 py-1 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Opacity Garis</label>
                        <input type="number" step="0.1" min="0" max="1" id="style-opacity" value="${styleProps.opacity ?? layer.options.opacity ?? 1}" class="w-full border rounded px-2 py-1 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Warna Isi</label>
                        <input type="color" id="style-fillColor" value="${styleProps.fillColor || layer.options.fillColor || '#10b981'}" class="w-full h-8 border rounded">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Opacity Isi</label>
                        <input type="number" step="0.1" min="0" max="1" id="style-fillOpacity" value="${styleProps.fillOpacity ?? layer.options.fillOpacity ?? 0.2}" class="w-full border rounded px-2 py-1 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Radius Titik</label>
                        <input type="number" id="style-radius" min="3" max="20" value="${styleProps.radius ?? layer.options.radius ?? 6}" class="w-full border rounded px-2 py-1 text-sm">
                    </div>
                </div>
                <div class="mt-2">
                    <button onclick="applyStyle()" class="bg-indigo-600 text-white px-3 py-1.5 rounded text-sm hover:bg-indigo-700">Terapkan Style</button>
                </div>
            `;
            container.appendChild(styleDiv);
        }

        function createInput(container, label, key, value) {
            const div = document.createElement('div');
            div.innerHTML = `
                <label class="block text-xs text-gray-500 mb-1">${label}</label>
                <input type="text" data-key="${key}" class="prop-input w-full border border-gray-300 rounded px-2 py-1 text-sm" value="${value || ''}">
            `;
            container.appendChild(div);
        }

        function applyProperties() {
            if (!selectedLayer) return;
            
            const inputs = document.querySelectorAll('.prop-input');
            const newProps = {};
            inputs.forEach(input => {
                newProps[input.dataset.key] = input.value;
            });
            
            if (!selectedLayer.feature) selectedLayer.feature = {};
            selectedLayer.feature.properties = newProps;
            
            // Update bindPopup if exists
            if (newProps.name || newProps.head_name) {
                selectedLayer.bindPopup(newProps.name || newProps.head_name);
            }
            
            alert("Properti diupdate sementara. Klik 'Simpan Perubahan' untuk menyimpan ke server.");
        }

        function readStyleInputs() {
            const color = document.getElementById('style-color')?.value || '#2563eb';
            const weight = parseFloat(document.getElementById('style-weight')?.value || '3');
            const opacity = parseFloat(document.getElementById('style-opacity')?.value || '1');
            const fillColor = document.getElementById('style-fillColor')?.value || '#10b981';
            const fillOpacity = parseFloat(document.getElementById('style-fillOpacity')?.value || '0.2');
            const radius = parseFloat(document.getElementById('style-radius')?.value || '6');
            return { color, weight, opacity, fillColor, fillOpacity, radius };
        }

        function applyStyle() {
            if (!selectedLayer) return;
            const style = readStyleInputs();
            
            // Persist style into properties so it can be saved & reloaded
            if (!selectedLayer.feature) selectedLayer.feature = { properties: {} };
            selectedLayer.feature.properties = selectedLayer.feature.properties || {};
            selectedLayer.feature.properties._style = style;

            // Apply visual style depending on layer type
            if (selectedLayer.setStyle) {
                // Polygon / Polyline
                selectedLayer.setStyle({
                    color: style.color,
                    weight: style.weight,
                    opacity: style.opacity,
                    fillColor: style.fillColor,
                    fillOpacity: style.fillOpacity
                });
            } else if (selectedLayer.setRadius) {
                // CircleMarker
                selectedLayer.setStyle({
                    color: style.color,
                    weight: style.weight,
                    opacity: style.opacity,
                    fillColor: style.fillColor,
                    fillOpacity: style.fillOpacity
                });
                selectedLayer.setRadius(style.radius);
            }

            alert("Style diterapkan. Klik 'Simpan Perubahan' untuk menyimpan ke server.");
        }

        function deleteSelectedFeature() {
            if (!selectedLayer) return;
            
            if (confirm("Apakah Anda yakin ingin menghapus fitur ini?")) {
                drawnItems.removeLayer(selectedLayer);
                selectedLayer = null;
                document.getElementById('feature-editor').classList.add('hidden');
                document.getElementById('editor-instructions').classList.remove('hidden');
            }
        }

        async function loadLayersList() {
            try {
                const res = await fetch('/api/layers');
                const files = await res.json();
                const optGroup = document.getElementById('geojson-layers-opt');
                optGroup.innerHTML = '';
                files.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f;
                    opt.innerText = f;
                    optGroup.appendChild(opt);
                });
            } catch (e) {
                console.error("Failed to load layers", e);
            }
        }

        document.getElementById('layer-select').addEventListener('change', async (e) => {
            currentLayerName = e.target.value;
            drawnItems.clearLayers();
            document.getElementById('feature-editor').classList.add('hidden');
            document.getElementById('editor-instructions').classList.remove('hidden');
            document.getElementById('search-input').value = '';

            if (!currentLayerName) return;

            console.log("Loading layer:", currentLayerName);

            if (currentLayerName === 'households') {
                document.getElementById('filter-container').classList.remove('hidden');
                loadHouseholds();
            } else {
                document.getElementById('filter-container').classList.add('hidden');
                loadGeoJSON(currentLayerName);
            }
        });

        // Search Input Enter Key
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') filterHouseholds();
        });

        async function loadGeoJSON(filename) {
            try {
                const res = await fetch(`/layers/${filename}?v=${new Date().getTime()}`);
                if (!res.ok) throw new Error("File not found");
                const data = await res.json();
                currentGeoJSON = data;
                
                const styleFn = (feature) => {
                    const s = feature.properties && feature.properties._style ? feature.properties._style : null;
                    if (!s) return { color: '#2563eb', weight: 3, opacity: 1, fillColor: '#10b981', fillOpacity: 0.2 };
                    return {
                        color: s.color || '#2563eb',
                        weight: s.weight ?? 3,
                        opacity: s.opacity ?? 1,
                        fillColor: s.fillColor || '#10b981',
                        fillOpacity: s.fillOpacity ?? 0.2
                    };
                };

                L.geoJSON(data, {
                    style: styleFn,
                    onEachFeature: (feature, layer) => {
                        drawnItems.addLayer(layer);
                        const label = feature.properties.name || feature.properties.NAMOBJ || feature.properties.Text || "Fitur";
                        layer.bindPopup(label);
                    },
                    pointToLayer: (feature, latlng) => {
                        const s = feature.properties && feature.properties._style ? feature.properties._style : {};
                        return L.circleMarker(latlng, {
                            radius: s.radius ?? 6,
                            color: s.color || '#2563eb',
                            weight: s.weight ?? 2,
                            opacity: s.opacity ?? 1,
                            fillColor: s.fillColor || '#10b981',
                            fillOpacity: s.fillOpacity ?? 0.2
                        });
                    }
                });
                
                if (drawnItems.getBounds().isValid()) {
                    map.fitBounds(drawnItems.getBounds());
                }
            } catch (e) {
                console.error(e);
                alert("Gagal memuat layer");
            }
        }

        async function loadHouseholds() {
            try {
                const res = await fetch(`/residents.json?v=${new Date().getTime()}`);
                const data = await res.json();
                allHouseholdsData = data;
                renderHouseholds(data);
            } catch (e) {
                console.error(e);
            }
        }

        function renderHouseholds(data) {
            drawnItems.clearLayers();
            let bounds = L.latLngBounds([]);
            
            data.forEach(hh => {
                if (hh.latitude && hh.longitude) {
                    const marker = L.marker([hh.latitude, hh.longitude]);
                    marker.feature = {
                        type: "Feature",
                        properties: hh
                    };
                    
                    let popupContent = `<b>${hh.head_name}</b><br>${hh.no_kk}`;
                    if (hh.dusun) {
                        popupContent += `<br><span class="text-xs text-gray-500">${hh.dusun}</span>`;
                    }
                    
                    marker.bindPopup(popupContent);
                    drawnItems.addLayer(marker);
                    bounds.extend([hh.latitude, hh.longitude]);
                }
            });
            
            if (bounds.isValid()) {
                map.fitBounds(bounds);
            }
        }

        function filterHouseholds() {
            const term = document.getElementById('search-input').value.toUpperCase();
            if (!term) {
                renderHouseholds(allHouseholdsData);
                return;
            }

            const filtered = allHouseholdsData.filter(hh => {
                const name = (hh.head_name || "").toUpperCase();
                const kk = (hh.no_kk || "");
                return name.includes(term) || kk.includes(term);
            });

            renderHouseholds(filtered);
            
            if (filtered.length === 0) alert("Tidak ditemukan");
            else if (filtered.length === 1) {
                // Auto select if only one
                // drawnItems.getLayers()[0].fire('click'); // Need to find the layer instance
            }
        }

        async function saveCurrentLayer() {
            if (!currentLayerName) return alert("Pilih layer terlebih dahulu");
            
            const features = [];
            drawnItems.eachLayer(layer => {
                const geo = layer.toGeoJSON();
                // Ensure properties are synced
                if (layer.feature && layer.feature.properties) {
                    geo.properties = layer.feature.properties;
                }
                features.push(geo);
            });

            const collection = {
                type: "FeatureCollection",
                features: features
            };

            if (currentLayerName === 'households') {
                // Special save for households
                const residents = features.map(f => {
                    const p = f.properties;
                    // Extract coords
                    const coords = f.geometry.coordinates; 
                    // GeoJSON Point is [lng, lat]
                    return {
                        ...p,
                        no_kk: p.no_kk, // Ensure keys match Go struct
                        head_name: p.head_name,
                        latitude: parseFloat(coords[1]),
                        longitude: parseFloat(coords[0])
                    };
                });
                
                try {
                    const res = await fetch('/api/save-households', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(residents)
                    });
                    if (res.ok) alert("Data penduduk berhasil disimpan!");
                    else alert("Gagal menyimpan data penduduk");
                } catch(e) { console.error(e); alert("Error saving"); }

            } else {
                // Save GeoJSON File
                try {
                    const res = await fetch('/api/save-layer', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            filename: currentLayerName,
                            data: collection
                        })
                    });
                    if (res.ok) alert("Layer berhasil disimpan!");
                    else alert("Gagal menyimpan layer");
                } catch(e) { console.error(e); alert("Error saving"); }
            }
        }

        async function createNewLayer() {
            const name = prompt("Nama Layer Baru (tanpa spasi, misal: jembatan):");
            if (!name) return;
            const filename = name.endsWith('.geojson') ? name : name + '.geojson';
            
            // Create empty
            try {
                const res = await fetch('/api/save-layer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        filename: filename,
                        data: { type: "FeatureCollection", features: [] }
                    })
                });
                if (res.ok) {
                    alert("Layer dibuat. Silakan refresh atau pilih dari list.");
                    loadLayersList();
                }
            } catch(e) { alert("Gagal membuat layer"); }
        }

        // Init
        loadLayersList();

    </script>
</body>
</html>
